<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send a Raven — Contact Form</title>
<style>

/* ============================================================
   SEND A RAVEN — contact poster
   Same token system as the Night's Watch recruitment poster.
   Fonts: Cinzel (display / carved headings) + Barlow Condensed (body)
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;900&family=Barlow+Condensed:ital,wght@0,400;0,500;0,600;0,700;1,500&display=swap');

:root{
  --void:      #05070d;
  --ink:       #0a1120;
  --panel:     #0e1830;
  --panel-2:   #13203c;
  --panel-3:   #182a4a;

  --line:        #2a3f60;
  --line-soft:   #1b2c47;
  --frost:       #8fd8ff;
  --frost-soft:  #c8ecff;
  --frost-dim:   #3d6480;

  --gold:        #d7b25f;
  --gold-bright: #f4d999;
  --gold-dim:    #7a642f;
  --bone:        #e9e3d2;
  --bone-dim:    #a9a28e;
}

*{ box-sizing:border-box; margin:0; padding:0; }

html,body{ background:#000; }

body{
  font-family:'Barlow Condensed', sans-serif;
  display:flex;
  justify-content:center;
  padding:28px 12px;
}

.font-display{ font-family:'Cinzel', serif; }

/* ============================================================
   POSTER SHELL
   ============================================================ */
.poster{
  position:relative;
  width:100%;
  max-width:640px;
  background:
    radial-gradient(ellipse at 50% 0%, #101d38 0%, var(--ink) 45%, var(--void) 100%);
  color:var(--bone);
  overflow:hidden;
  box-shadow:0 40px 100px rgba(0,0,0,.7);
}

.poster::after{
  content:"";
  position:absolute; inset:0;
  pointer-events:none;
  background:linear-gradient(90deg, rgba(0,0,0,.4) 0%, transparent 10%, transparent 90%, rgba(0,0,0,.4) 100%);
  z-index:5;
}

section{ position:relative; z-index:2; }

/* drifting snow, ambient across whole poster */
.snowfall{ position:absolute; inset:0; z-index:4; pointer-events:none; overflow:hidden; }
.snowfall span{
  position:absolute; top:-5%;
  width:3px; height:3px;
  background:var(--frost-soft);
  border-radius:50%;
  opacity:.55;
  filter:drop-shadow(0 0 2px var(--frost));
  animation:fall linear infinite;
}
@keyframes fall{ to{ transform:translateY(900px); } }
@media (prefers-reduced-motion: reduce){
  .snowfall span{ animation:none; display:none; }
}

/* ============================================================
   FROST DIVIDER
   ============================================================ */
.frost-divider{ position:relative; height:34px; z-index:3; }
.frost-divider svg{ width:100%; height:100%; display:block; }
.frost-divider path{ fill:none; stroke:var(--frost-dim); stroke-width:1.2; }
.frost-divider path.bright{
  stroke:var(--frost); stroke-width:1; opacity:.8;
  filter:drop-shadow(0 0 3px rgba(143,216,255,.6));
}

/* ============================================================
   HERO / BANNER
   ============================================================ */
.hero{
  position:relative;
  padding:38px 20px 26px;
  text-align:center;
  overflow:hidden;
  background:
    radial-gradient(ellipse at 50% 78%, rgba(219,150,60,.16) 0%, rgba(219,150,60,0) 45%),
    linear-gradient(180deg, #0b1224 0%, #0e1830 55%, #0a1120 100%);
}
.hero::before{
  content:"";
  position:absolute; inset:-20% -10%;
  background:
    conic-gradient(from 200deg at 50% 20%,
      rgba(143,216,255,0) 0deg,
      rgba(143,216,255,.10) 60deg,
      rgba(120,190,255,0) 140deg,
      rgba(215,178,95,.07) 220deg,
      rgba(143,216,255,0) 360deg);
  filter:blur(18px);
  animation:aurora 22s ease-in-out infinite alternate;
  z-index:0;
}
@keyframes aurora{
  from{ transform:translateX(-3%) rotate(0deg); }
  to{   transform:translateX(3%) rotate(3deg); }
}
@media (prefers-reduced-motion: reduce){ .hero::before{ animation:none; } }

.stars{ position:absolute; inset:0; z-index:0; }
.stars span{
  position:absolute; width:2px; height:2px;
  background:var(--bone); border-radius:50%; opacity:.5;
}

.banner{
  position:relative;
  z-index:3;
  margin:6px auto 10px;
  max-width:480px;
  padding:16px 34px 20px;
  clip-path:polygon(3% 0%, 97% 0%, 100% 22%, 100% 78%, 97% 100%, 3% 100%, 0% 78%, 0% 22%);
  background:linear-gradient(180deg, #16223c 0%, #0c1526 60%, #0a1120 100%);
  box-shadow:
    0 0 0 1px var(--line),
    inset 0 0 0 1px rgba(143,216,255,.15),
    0 0 26px rgba(0,0,0,.6);
}
.banner h1{
  font-family:'Cinzel', serif;
  font-weight:900;
  font-size:clamp(26px, 7vw, 38px);
  letter-spacing:.05em;
  line-height:1.05;
  background:linear-gradient(180deg, #ffffff 0%, #cfe9ff 45%, #8fb9dd 100%);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  text-shadow:0 0 18px rgba(143,216,255,.35);
  filter:drop-shadow(0 2px 0 rgba(0,0,0,.6));
}

.hero-sub{
  position:relative;
  z-index:2;
  max-width:420px;
  margin:0 auto;
  font-size:16px;
  letter-spacing:.02em;
  color:var(--bone-dim);
  line-height:1.4;
}

/* ============================================================
   SECTION HEADING (shared motif)
   ============================================================ */
.section-heading{
  display:flex;
  align-items:center;
  gap:14px;
  margin:26px 16px 16px;
}
.section-heading::before,
.section-heading::after{
  content:"";
  flex:1;
  height:1px;
  background:linear-gradient(90deg, transparent, var(--line-soft) 50%, transparent);
}
.section-heading::before{ background:linear-gradient(90deg, transparent, var(--gold-dim)); }
.section-heading::after{ background:linear-gradient(90deg, var(--gold-dim), transparent); }
.section-heading h2{
  font-family:'Cinzel', serif;
  font-weight:600;
  font-size:clamp(14px, 3.6vw, 17px);
  letter-spacing:.12em;
  color:var(--gold-bright);
  white-space:nowrap;
  text-shadow:0 0 12px rgba(215,178,95,.25);
  text-transform:uppercase;
}

/* ============================================================
   RAVEN FRAME — houses the embedded form
   ============================================================ */
.raven-frame{
  position:relative;
  margin:0 16px 30px;
  padding:14px;
  background:linear-gradient(150deg, var(--panel-2) 0%, var(--ink) 75%);
  border:1px solid var(--frost-dim);
  box-shadow:
    inset 0 0 0 1px rgba(143,216,255,.08),
    0 0 40px rgba(60,110,150,.12);
}
.raven-frame .frame-label{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  margin-bottom:12px;
  font-size:11px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--frost-dim);
}
.raven-frame .frame-label .dot{
  width:5px; height:5px;
  background:var(--frost);
  border-radius:50%;
  box-shadow:0 0 6px var(--frost);
}
.raven-frame .iframe-wrap{
  position:relative;
  background:var(--ink);
  border:1px solid var(--line);
  box-shadow:inset 0 0 24px rgba(0,0,0,.6);
  overflow:hidden;
}
.raven-frame iframe{
  display:block;
  width:100%;
  height:550px;
  border:0;
  filter:invert(92%) hue-rotate(178deg) contrast(.92) brightness(.95);
  background:var(--ink);
}

.raven-frame .frame-foot{
  margin-top:12px;
  text-align:center;
  font-size:12.5px;
  letter-spacing:.03em;
  color:var(--bone-dim);
}
.raven-frame .frame-foot .gold{ color:var(--gold); }

/* ============================================================
   FOOTER
   ============================================================ */
.footer{
  position:relative;
  padding:22px 20px 30px;
  text-align:center;
  background:linear-gradient(180deg, var(--ink) 0%, #060a14 100%);
}
.footer-flakes{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  margin-bottom:14px;
}
.footer-rule{
  height:1px;
  width:60px;
  background:linear-gradient(90deg, transparent, var(--frost-dim));
}
.footer-rule.right{ background:linear-gradient(90deg, var(--frost-dim), transparent); }
.flake-badge{
  width:22px; height:22px;
  color:var(--frost-dim);
}
.flake-badge svg{ width:100%; height:100%; }
.footer h2{
  font-family:'Cinzel', serif;
  font-weight:700;
  font-size:clamp(16px, 4.4vw, 20px);
  letter-spacing:.04em;
  color:var(--bone);
}

</style>
</head>
<body>

<div class="poster">

  <div class="snowfall" id="snowfall"></div>

  <section class="hero">
    <div class="stars" id="stars"></div>

    <div class="banner">
      <h1 class="font-display">Send a Raven</h1>
    </div>

    <p class="hero-sub">Every message reaches the Wall in time. Fill out the scroll below and a Brother of the Watch will answer.</p>
  </section>

  <div class="frost-divider">
    <svg viewBox="0 0 640 34" preserveAspectRatio="none">
      <path d="M0,17 L180,17 L200,6 L230,17 L410,17 L440,26 L470,17 L640,17"/>
      <path class="bright" d="M0,17 L180,17 L200,6 L230,17 L410,17 L440,26 L470,17 L640,17"/>
    </svg>
  </div>

  <div class="section-heading">
    <h2 class="font-display">The Scroll</h2>
  </div>

  <div class="raven-frame">
    <div class="frame-label">
      <span class="dot"></span> Sealed &amp; delivered beyond the Wall
    </div>
    <div class="iframe-wrap">
      <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSf_qoqrzcyDdSQhZUhYzVh2wahqNsyNeyWKUY-HAEKbPUqEiw/viewform?embedded=true" width="640" height="409" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>
    </div>
    <div class="frame-foot">Word will be sent by raven within <span class="gold">two days' ride</span>.</div>
  </div>

  <footer class="footer">
    <div class="footer-flakes">
      <div class="footer-rule"></div>
      <div class="flake-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2v20M4 7l16 10M20 7L4 17M12 2l3 3-3 3-3-3 3-3M12 22l3-3-3-3-3 3 3 3M4 7l4 1-1 4M20 7l-4 1 1 4M4 17l4-1-1-4M20 17l-4-1 1-4"/></svg>
      </div>
      <div class="flake-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2v20M4 7l16 10M20 7L4 17M12 2l3 3-3 3-3-3 3-3M12 22l3-3-3-3-3 3 3 3M4 7l4 1-1 4M20 7l-4 1 1 4M4 17l4-1-1-4M20 17l-4-1 1-4"/></svg>
      </div>
      <div class="footer-rule right"></div>
    </div>
    <h2 class="font-display">Winter Is Coming — So Is Our Reply</h2>
  </footer>

</div>

<script>
  const starsEl = document.getElementById('stars');
  for(let i=0;i<20;i++){
    const s = document.createElement('span');
    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*70+'%';
    s.style.opacity = (0.2 + Math.random()*0.6).toFixed(2);
    s.style.width = s.style.height = (Math.random()<0.2 ? 3 : 2)+'px';
    starsEl.appendChild(s);
  }

  const snowEl = document.getElementById('snowfall');
  for(let i=0;i<26;i++){
    const f = document.createElement('span');
    f.style.left = Math.random()*100+'%';
    const dur = 10 + Math.random()*14;
    f.style.animationDuration = dur+'s';
    f.style.animationDelay = (-Math.random()*dur)+'s';
    f.style.width = f.style.height = (1.5 + Math.random()*2.2)+'px';
    snowEl.appendChild(f);
  }
</script>

</body>
</html>
